# git-cliff configuration for InvToolkit
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog\n
All notable changes to InvToolkit will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/ablanc0/Investment-Toolkit-App
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
{%- if commit.scope %}
- **{{ commit.scope }}:** {{ commit.message }}
  {%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}
{%- else %}
- {{ commit.message }}
  {%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}
{%- endif %}
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  # Skip rules first (evaluated top-to-bottom, first match wins)
  { message = "^Merge", skip = true },
  { message = "^first commit", skip = true },
  { message = "expand logo database", skip = true },
  { message = "bulk-download.*logos", skip = true },
  { message = "commit logo database", skip = true },
  { message = "upgrade all logos to 128px", skip = true },
  { message = "standardize all logos to 128px", skip = true },
  # Group rules
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^ui", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore", group = "Maintenance" },
  { message = "^test", group = "Testing" },
  { message = "^style", group = "Changed" },
  { message = "^experiment", group = "Experimental" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

[remote.github]
owner = "ablanc0"
repo = "Investment-Toolkit-App"

# git-cliff configuration for InvToolkit
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog\n
All notable changes to InvToolkit will be documented in this file.

**Labels:** 🚀 Feature · ✨ Enhancement · 🐛 Fix · 🔒 Security · 📖 Documentation\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/ablanc0/Investment-Toolkit-App
{%- endmacro -%}

{%- set_global current_date = "" -%}
{% for commit in commits -%}
{%- set commit_date = commit.author.timestamp | date(format="%Y-%m-%d") -%}
{%- if commit_date != current_date -%}
{%- set_global current_date = commit_date %}

## {{ commit_date }}
{% endif -%}
{%- if commit.scope -%}
- {{ commit.group }} **{{ commit.scope }}:** {{ commit.message }}
  {%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}
{% else -%}
- {{ commit.group }} {{ commit.message }}
  {%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}
{% endif -%}
{%- endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  # Skip rules first (evaluated top-to-bottom, first match wins)
  { message = "^Merge", skip = true },
  { message = "^first commit", skip = true },
  { message = "expand logo database", skip = true },
  { message = "bulk-download.*logos", skip = true },
  { message = "commit logo database", skip = true },
  { message = "upgrade all logos to 128px", skip = true },
  { message = "standardize all logos to 128px", skip = true },
  # Security fixes (before generic fix rule)
  { message = "^fix.*(?i)(xss|security|secret|env var|validation|header)", group = "🔒 Security" },
  # 5 clean labels
  { message = "^feat", group = "🚀 Feature" },
  { message = "^fix", group = "🐛 Fix" },
  { message = "^ui", group = "✨ Enhancement" },
  { message = "^refactor", group = "✨ Enhancement" },
  { message = "^style", group = "✨ Enhancement" },
  { message = "^docs", group = "📖 Documentation" },
  # Internal — skip from changelog
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^experiment", skip = true },
]
filter_commits = false
# Never match tags — all commits in one flat group, sorted by date
tag_pattern = "NONE"
sort_commits = "newest"

[remote.github]
owner = "ablanc0"
repo = "Investment-Toolkit-App"
